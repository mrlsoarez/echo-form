<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Echo Form</title>
    <link rel = "stylesheet" href = "styles/index.css">
</head>
<body>
    <div class = "Main Container">
        <div class = "Circle"></div>
        <div class = "Left">
            <section>
                <h2>START-UP NAME</h2>
                <svg width="150px" height="150px" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path fill-rule="evenodd" clip-rule="evenodd" d="M8 16C12.4183 16 16 12.4183 16 8C16 3.58172 12.4183 0 8 0C3.58172 0 0 3.58172 0 8C0 12.4183 3.58172 16 8 16ZM12 8H9V3H7V8H4V9L8 13L12 9V8Z" fill="#000000"/>
                </svg>
            </section>
        </div>
        <div class = "Right">
            <div class = "Upper-Title">
                <h1>Title</h1>
                <p>Lorem ipsum dolor sit, amet consectetur adipisicing elit. Quasi non tempora facilis recusandae corporis, inventore dolor ab vero deserunt numquam aperiam fugiat laboriosam dicta, temporibus laborum, labore quod? Ipsa, inventore.</p>
                <div class = "Line"></div>
            </div>
            <div class = "Form">
                <form>
                    <section>
                        <label for = "first-name">Name:</label>
                        <input name = "first-name" id = "first-name" type = "text"> 
                    </section>
                    <section>
                        <label for = "email">E-mail</label>
                        <input name = "email" id = "email" type = "email">
                    </section>
                    <section>
                        <label for = "password-1">Password</label>
                        <input name = "password-1" id = "password-1" type = "password">
                    </section>
                    <section>
                        <label for = "password-2">Confirm Password</label>
                        <input name = "password-2" id = "password-2" type = "password">
                    </section>
                    <section>
                        <input name = "check" id = "check" type = "checkbox">
                        <label for = "check">Click if you want to.</label>
                    </section>
                    <section>
                        <input type = "submit" value = "REGISTER">
                    </section>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
